<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MIRRORR</title>
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/bootstrap-icons.css" />
  <link rel="shortcut icon" href="/favicon.ico" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-flex">
      <h1><a href="index.html"><pre>   \  | _)
  |\/ |  |   _| _| _ \   _| _|
 _|  _| _| _| _| \___/ _| _|</pre></a></h1>
      <div class="topbar-actions">
        <label onclick="window.location.href='settings.html'" title="Settings" class="topbar-button"><i class="bi bi-gear"></i></label>
      </div>
    </div>
  </header>

  <main>
    <section>
      <div class="section-header">
        <h2 id="page-title">Log</h2>
        <a id="log-download-btn" title="Download"><i class="bi bi-arrow-down-circle"></i></a>
      </div>
      <div class="section-main">
        <pre id="full-log-content"></pre>
        <p><h3>All logs</h3><div id="all-logs"></div></p>
        <button type="button" onclick="window.location.href='index.html'" class="back-btn">Home</button>
        <button type="button" class="delete-btn" id="logs-purge-btn">Purge</button>
      </div>
    </section>
  </main>

  <footer class="btmbar">
    <div class="btmbar-content">
      <h3>Support Open Source&nbsp;&nbsp;&nbsp;O_O</h3>
      <a target="_blank" href="https://github.com/mchatzi/mirrorr" title="Mirrorr on Github"><i class="bi bi-github"></i></a>
    </div>
  </footer>

  <script src="joblog.js"></script>
</body>
</html>
